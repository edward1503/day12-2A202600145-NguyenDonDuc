# hãy di chuyển tới branch MASTER
version: "3.9"

services:
  agent:
    build:
      context: ..
      dockerfile: 06-lab-complete/Dockerfile
    env_file: .env                         # Tự động đọc API Key từ file .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - AGENT_API_KEY=my-super-secret-key-123  # Vẫn có thể override nếu muốn
      - JWT_SECRET=local-dev-secret-123
      - APP_NAME=VinBank Agent Production
      - DEBUG=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      replicas: 2                          # Chạy 2 instance agent
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"                          # Map cổng 8000 của máy bạn vào cổng 80 của Nginx
    depends_on:
      - agent
    networks:
      - internal

networks:
  internal:
    driver: bridge
